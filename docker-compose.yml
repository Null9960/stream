version: '3.8'

services:
  playimdb-addon:
    build: .
    container_name: stremio-playimdb
    ports:
      - "7000:7000"
    environment:
      - PORT=7000
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7000/manifest.json"]
      interval: 30s
      timeout: 10s
      retries: 3
